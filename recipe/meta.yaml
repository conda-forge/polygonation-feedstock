{% set name = "polygonation" %}
{% set version = "0.1.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/polygonation-{{ version }}.tar.gz
  sha256: 2ca38c7ffce83e875c11fb76a21f3bd6bb27d0394be91c699ae54347fca9c073

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - numpy
    - python >={{ python_min }}
    - scipy

test:
  imports:
    - polygonation
    - polygonation.tests
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/rwijtvliet/polygonation
  summary: Python package to tessellate a set of points in the plane with polygons.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rwijtvliet
